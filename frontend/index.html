<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- ── Primary SEO ──────────────────────────────────────────────── -->
    <title>LectureMap — Turn Any Lecture Into a Knowledge Map</title>
    <meta name="title" content="LectureMap — Turn Any Lecture Into a Knowledge Map" />
    <meta name="description" content="Upload lecture audio or paste a YouTube URL and LectureMap builds an interactive concept dependency graph with gap detection and SM-2 spaced repetition flashcards. No signup needed." />
    <meta name="keywords" content="lecture notes, knowledge graph, spaced repetition, flashcards, concept map, study tool, Anki export, AI study assistant, prerequisite learning, Whisper transcription" />
    <meta name="author" content="LectureMap" />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://lecturemap.app/" />

    <!-- ── Favicons ─────────────────────────────────────────────────── -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="48x48" href="/favicon-48x48.png" />
    <link rel="icon" type="image/png" sizes="96x96" href="/favicon-96x96.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/site.webmanifest" />
    <meta name="theme-color" content="#4f46e5" />
    <meta name="msapplication-TileColor" content="#4f46e5" />

    <!-- ── Google Search Console verification ──────────────────────────
         Replace this content value with the code from:
         https://search.google.com/search-console → Settings → Ownership verification → HTML tag
         A matching HTML-file method placeholder also lives at
         /public/googleXXXXXXXXXXXXXXXX.html — rename that file to the
         exact filename Search Console gives you, or use this meta tag
         instead (only one verification method is required). ────────── -->
    <meta name="google-site-verification" content="REPLACE_WITH_YOUR_GOOGLE_SITE_VERIFICATION_CODE" />

    <!-- ── Open Graph / Facebook / LinkedIn ────────────────────────────── -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://lecturemap.app/" />
    <meta property="og:title" content="LectureMap — Turn Any Lecture Into a Knowledge Map" />
    <meta property="og:description" content="The only tool that shows how concepts connect — and exactly what to learn first. Upload audio, get an interactive prerequisite graph and SM-2 flashcards in minutes." />
    <meta property="og:image" content="https://lecturemap.app/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="LectureMap — interactive knowledge graph and flashcard preview" />
    <meta property="og:site_name" content="LectureMap" />
    <meta property="og:locale" content="en_US" />

    <!-- ── Twitter / X Card ─────────────────────────────────────────── -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:url" content="https://lecturemap.app/" />
    <meta name="twitter:title" content="LectureMap — Turn Any Lecture Into a Knowledge Map" />
    <meta name="twitter:description" content="The only tool that shows how concepts connect — and exactly what to learn first. No signup needed." />
    <meta name="twitter:image" content="https://lecturemap.app/og-image.png" />
    <meta name="twitter:image:alt" content="LectureMap — interactive knowledge graph and flashcard preview" />

    <!-- ── Structured data (JSON-LD) for rich search results ───────────── -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "SoftwareApplication",
      "name": "LectureMap",
      "url": "https://lecturemap.app/",
      "applicationCategory": "EducationalApplication",
      "operatingSystem": "Web",
      "description": "Transform lecture audio and video into interactive concept dependency knowledge graphs with spaced repetition flashcards.",
      "offers": {
        "@type": "Offer",
        "price": "0",
        "priceCurrency": "USD"
      },
      "featureList": [
        "Concept dependency graph visualization",
        "Knowledge gap detection",
        "AI-generated spaced repetition flashcards",
        "SM-2 review scheduling",
        "Anki and PDF export",
        "Cross-lecture concept linking"
      ],
      "image": "https://lecturemap.app/og-image.png"
    }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
